# tachyon-examples — the full Tachyon showcase, run from the repo root.
# This IS a git repo, so `worktree: true` works for real: the `feature` agent
# runs on its own branch; `verify: test` runs the monorepo's `npm test`
# (npm workspaces → both packages) IN the worktree — isolate → review → verify.
#
# For the MULTI-ROOT demo (two folders, two Bridges), open orbit.code-workspace.
# Docs & format: https://github.com/cfpperche/tachyon

agents:
  # The orchestrator — drives the fleet via the MCP Bridge tools. `role:` (spec 216) prepends a
  # built-in role contract; `instructions:` adds the task-specific bit on top (role extends, never
  # replaces, the instructions).
  claude:
    cmd: claude
    autostart: true
    role: orchestrator
    instructions: delegate reviews to codex via the tachyon tools

  # A second model as a reviewer.
  codex:
    cmd: codex
    role: reviewer
    instructions: flag correctness and security issues

  # Isolated on its own git worktree + branch (the ⎇ badge). `verify: test` runs
  # the monorepo's npm test IN the worktree → the ✓/✗/⊘ badge. Review the diff,
  # then merge with plain git.
  feature:
    cmd: claude
    role: coder
    worktree: true
    verify: test
    instructions: implement the feature on your own branch; run Verify before handing off

  # ISOLATED HARNESS (spec 226, Tachyon ≥ 0.22) — this claude agent gets its OWN MCP server
  # (Tavily web search), scoped to ITSELF: no other agent in the fleet sees it. Tachyon materializes a
  # private config home (.tachyon/harness/researcher/) and runs it with --strict-mcp-config. ⚙ badge.
  researcher:
    cmd: claude
    harness:
      inherit: workspace               # fleet config + this agent's extras (use `none` for a clean slate)
      mcp:
        tavily:
          command: npx
          args: ["-y", "tavily-mcp"]
          env:
            TAVILY_API_KEY: ${TAVILY_API_KEY}  # Put TAVILY_API_KEY in a .env at the repo root (see
                                               # .env.example) — Tachyon resolves it and injects it into
                                               # the agent; only the literal ${VAR} is ever on disk.
                                               # (A shell export also works and takes precedence.)
    instructions: you are the research specialist; use the Tavily MCP for web search and source-gathering

  # An isolated harness is CLAUDE-ONLY in v1 — a `harness:` block on the codex agent above would be a
  # config error (codex CODEX_HOME support is a follow pass). When it lands it will look like this:
  #
  #   codex-research:
  #     cmd: codex
  #     harness:
  #       inherit: workspace
  #       mcp:
  #         tavily: { command: npx, args: ["-y", "tavily-mcp"], env: { TAVILY_API_KEY: ${TAVILY_API_KEY} } }

terminals:
  # Non-AI processes — servers, shells, builds (attention off by default).
  dev:
    cmd: npm run dev               # the orbit-api dev server
    watch: "orbit-api/src/**"
  shell:
    cmd: bash

commands:
  test: {cmd: npm test}            # npm workspaces → runs both packages' tests
  lint: {cmd: npm run lint}

runbooks:
  ship:                            # the pre-merge gate, as a runbook
    steps: [lint, test]

schedules:
  hourly-tests:                    # run the suite every hour while the workspace is open
    every: 1h
    run: test

settings:
  auth: true                       # require a Bearer token on the MCP Bridge (recommended)
