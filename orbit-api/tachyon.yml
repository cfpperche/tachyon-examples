# orbit-api — the API service fleet (one half of the multi-root demo).
# The worktree + verify showcase lives in the repo-root tachyon.yml (worktree
# isolation needs the workspace to BE the git root).
agents:
  # The orchestrator — drives the fleet via the MCP Bridge tools (role: spec 216).
  claude:
    cmd: claude
    autostart: true
    role: orchestrator
    instructions: delegate reviews to codex via the tachyon tools

  # A second model as a reviewer — Claude can ask it to review a diff.
  codex:
    cmd: codex
    role: reviewer
    instructions: flag correctness and security issues

terminals:
  # Non-AI processes — servers, shells, builds (attention off by default).
  dev:
    cmd: npm run dev
    watch: "src/**"     # restarts when source changes
  shell:
    cmd: bash

commands:
  test: {cmd: npm test}
  lint: {cmd: npm run lint}

runbooks:
  ship:                  # the pre-merge gate, as a runbook
    steps: [lint, test]

schedules:
  hourly-tests:          # run the suite every hour while the workspace is open
    every: 1h
    run: test

settings:
  auth: true             # require a Bearer token on the MCP Bridge (recommended)
